<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANÁLISIS INSTITUCIONAL - Grupo Edúcate Colombia</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        educate: { 'dark': '#17334B', 'blue': '#11678B', 'teal': '#54BBAB', 'orange': '#F39325', 'red': '#B01829' }
                    },
                    fontFamily: { barlow: ['Barlow Condensed', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Barlow Condensed', sans-serif; }
        .bg-gradient-educate { background: linear-gradient(135deg, #17334B 0%, #11678B 100%); }
    </style>
</head>
<body class="bg-slate-100 text-educate-dark">

    <nav class="no-print bg-educate-dark text-white p-4 sticky top-0 z-50 border-b-4 border-educate-teal shadow-2xl">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="assets/img/Logo_grupo_educate.png" alt="Edúcate" class="h-10 bg-white p-1 rounded">
                <h1 class="text-xl font-bold uppercase italic tracking-tighter">Módulo 1: <span class="text-educate-teal font-light">Análisis Institucional</span></h1>
            </div>
            <div class="flex gap-4">
                <select id="selectDANE" onchange="Inst.init()" class="bg-white/10 border border-white/20 rounded px-4 py-1.5 text-sm text-white outline-none">
                    <option class="text-black" value="">Seleccione Institución...</option>
                </select>
                <a href="index.html" class="bg-educate-blue px-4 py-1.5 rounded text-sm font-bold uppercase">Vista Estudiantes</a>
                <button onclick="Inst.exportar()" class="bg-educate-orange px-4 py-1.5 rounded text-sm font-bold uppercase">Exportar PDF</button>
            </div>
        </div>
    </nav>

    <main id="reporte-inst" class="container mx-auto p-6 lg:p-10 max-w-7xl">
        <div class="bg-gradient-educate rounded-sm p-10 text-white shadow-2xl mb-10 relative overflow-hidden">
            <h2 id="inst-nombre" class="text-6xl font-extrabold uppercase italic tracking-tighter leading-none relative z-10">Seleccione Colegio</h2>
            <div class="flex gap-10 mt-6 text-educate-teal font-bold text-xl uppercase tracking-widest relative z-10">
                <p>DANE: <span id="inst-dane" class="text-white">--</span></p>
                <p>GRADOS: <span id="inst-grados" class="text-white">--</span></p>
            </div>
            <div class="absolute right-[-50px] top-[-50px] opacity-10 text-[300px] font-black italic select-none">EDÚCATE</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
            <div class="lg:col-span-1 bg-white p-8 shadow-xl border-t-4 border-educate-orange">
                <h4 class="font-black text-educate-dark mb-6 uppercase italic border-b pb-2">Ranking de Grupos</h4>
                <div id="ranking-list" class="space-y-4 text-2xl font-bold"></div>
            </div>
            <div class="lg:col-span-2 bg-white p-8 shadow-xl border-t-4 border-educate-teal">
                <h4 class="font-black text-educate-dark mb-6 uppercase italic border-b pb-2 text-center text-sm">Evolución Promedios por Grupo</h4>
                <canvas id="chartProgresoInst" height="150"></canvas>
            </div>
        </div>

        <!-- TABLA MATRIZ REAL -->
        <div class="bg-white shadow-2xl mb-10 border border-slate-200 overflow-hidden">
            <div class="bg-educate-dark p-4 text-white">
                <h4 class="font-black uppercase tracking-widest italic text-sm">Matriz de Desempeño por Áreas (Promedios Reales)</h4>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-center border-collapse">
                    <thead class="bg-slate-100 text-educate-dark text-xs font-black uppercase tracking-widest">
                        <tr>
                            <th class="p-4 border-r">GRUPO</th>
                            <th class="p-4">MATEMÁTICAS</th>
                            <th class="p-4">LECTURA</th>
                            <th class="p-4">SOCIALES</th>
                            <th class="p-4">NATURALES</th>
                            <th class="p-4">INGLÉS</th>
                        </tr>
                    </thead>
                    <tbody id="body-matriz" class="font-bold text-lg italic"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const Inst = {
            config: null,
            instData: {},

            loadConfig: async function() {
                try {
                    // RUTA CORREGIDA: Ahora busca en la raíz
                    const res = await fetch('./config.json');
                    this.config = await res.json();
                    const sel = document.getElementById('selectDANE');
                    this.config.forEach(c => {
                        sel.innerHTML += `<option class="text-black" value="${c.dane}">${c.nombre}</option>`;
                    });
                } catch (e) { console.error("Error config", e); }
            },

            init: async function() {
                const dane = document.getElementById('selectDANE').value;
                const colegio = this.config.find(c => c.dane === dane);
                if (!colegio) return;

                document.getElementById('inst-nombre').innerText = colegio.nombre;
                document.getElementById('inst-dane').innerText = colegio.dane;
                document.getElementById('inst-grados').innerText = colegio.grupos.length;

                await this.procesarData(colegio);
                this.renderDashboard(colegio.pruebas);
            },

            procesarData: async function(colegio) {
                this.instData = { grupos: {}, matData: {} };
                for (let g of colegio.grupos) {
                    this.instData.grupos[g] = [];
                    this.instData.matData[g] = { mat:0, lec:0, soc:0, nat:0, ing:0 };
                    
                    for (let p of colegio.pruebas) {
                        try {
                            // RUTA CORREGIDA: Busca en ./data/
                            const res = await fetch(`./data/${colegio.dane}/${g}-${p}.csv`);
                            if (!res.ok) continue;
                            const text = await res.text();
                            const rows = Papa.parse(text, { header: true, delimiter: ";" }).data.filter(r => r.PUNTAJE);
                            
                            if (rows.length > 0) {
                                const avg = rows.reduce((s, c) => s + parseFloat(c.PUNTAJE.replace(",", ".")), 0) / rows.length;
                                this.instData.grupos[g].push(avg.toFixed(1));
                                
                                // Guardar promedios de áreas de la última prueba cargada
                                const last = rows[0];
                                this.instData.matData[g] = {
                                    mat: (rows.reduce((s, c) => s + parseFloat(c["MATEMÁTICAS"]?.replace(",",".") || 0), 0) / rows.length).toFixed(1),
                                    lec: (rows.reduce((s, c) => s + parseFloat(c["LECTURA CRÍTICA"]?.replace(",",".") || 0), 0) / rows.length).toFixed(1),
                                    soc: (rows.reduce((s, c) => s + parseFloat(c["SOCIALES Y CIUDADANAS"]?.replace(",",".") || 0), 0) / rows.length).toFixed(1),
                                    nat: (rows.reduce((s, c) => s + parseFloat(c["CIENCIAS NATURALES"]?.replace(",",".") || 0), 0) / rows.length).toFixed(1),
                                    ing: (rows.reduce((s, c) => s + parseFloat(c["INGLÉS"]?.replace(",",".") || 0), 0) / rows.length).toFixed(1)
                                };
                            }
                        } catch (e) { this.instData.grupos[g].push(0); }
                    }
                }
            },

            renderDashboard: function(pruebas) {
                this.renderRanking();
                this.renderProgreso(pruebas);
                this.renderMatriz();
            },

            renderRanking: function() {
                const list = document.getElementById('ranking-list');
                list.innerHTML = "";
                const ranking = Object.keys(this.instData.grupos)
                    .map(g => ({ name: g, score: parseFloat(this.instData.grupos[g].slice(-1)[0] || 0) }))
                    .sort((a, b) => b.score - a.score);

                ranking.forEach((r, i) => {
                    list.innerHTML += `
                        <div class="flex justify-between items-center p-4 ${i === 0 ? 'bg-educate-dark text-white' : 'bg-slate-50'} rounded mb-2">
                            <span class="text-xs italic">#${i + 1}</span>
                            <span>GRUPO ${r.name}</span>
                            <span class="text-3xl font-black">${r.score}</span>
                        </div>`;
                });
            },

            renderProgreso: function(pruebas) {
                const ctx = document.getElementById('chartProgresoInst').getContext('2d');
                if (window.pCh) window.pCh.destroy();
                const datasets = Object.keys(this.instData.grupos).map((g, i) => ({
                    label: `Grupo ${g}`,
                    data: this.instData.grupos[g],
                    borderColor: ['#11678B', '#F39325', '#54BBAB'][i % 3],
                    tension: 0.4, fill: false, borderWidth: 4
                }));
                window.pCh = new Chart(ctx, { type: 'line', data: { labels: pruebas, datasets } });
            },

            renderMatriz: function() {
                const body = document.getElementById('body-matriz');
                body.innerHTML = "";
                Object.keys(this.instData.matData).forEach(g => {
                    const d = this.instData.matData[g];
                    body.innerHTML += `
                        <tr class="border-b">
                            <td class="p-6 bg-slate-900 text-white text-sm">${g}</td>
                            <td class="p-6" style="color:${this.getColor(d.mat)}">${d.mat}</td>
                            <td class="p-6" style="color:${this.getColor(d.lec)}">${d.lec}</td>
                            <td class="p-6" style="color:${this.getColor(d.soc)}">${d.soc}</td>
                            <td class="p-6" style="color:${this.getColor(d.nat)}">${d.nat}</td>
                            <td class="p-6" style="color:${this.getColor(d.ing)}">${d.ing}</td>
                        </tr>`;
                });
            },

            getColor: function(val) {
                if (val < 35) return '#B01829'; // Rojo
                if (val < 50) return '#F39325'; // Naranja
                return '#11678B'; // Azul Educate
            },

            exportar: function() {
                const el = document.getElementById('reporte-inst');
                html2pdf().set({ margin: 0.3, filename: 'Institucional.pdf', html2canvas: { scale: 2 }, jsPDF: { orientation: 'landscape' } }).from(el).save();
            }
        };

        window.onload = () => Inst.loadConfig();
    </script>
</body>
</html>
